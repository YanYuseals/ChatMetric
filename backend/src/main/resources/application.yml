server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/chatmetric?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root

mybatis:
  configuration:
    map-underscore-to-camel-case: true

chatmetric:
  # 通过请求头 X-User-Id 简化模拟登录（生产建议接入 Spring Security/JWT）
  security:
    user-id-header: X-User-Id
  dashscope:
    base-url: https://dashscope.aliyuncs.com
    api-key: ${DASHSCOPE_API_KEY:}
    chat-model: qwen-plus
    embedding-model: text-embedding-v2
  milvus:
    host: 127.0.0.1
    port: 19530
    collection: metric_desc
    dimension: 1536

